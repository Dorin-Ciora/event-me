<div class="nav-wrapper">
    <div class="d-flex">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" role="img" aria-label="EventMe logo">
            <text
                x="0"
                y="86"
                font-family="Montserrat, system-ui, sans-serif"
                font-size="90"
                font-weight="800"
                fill="currentColor"
                letter-spacing="-0.5"
            >
                EventMe
            </text>
        </svg>
    </div>
    <div class="flex border-t lg:border-t-0 border-surface py-4 lg:py-0 mt-4 lg:mt-0 gap-2">
        <button
            class="text-xl"
            pButton
            pRipple
            label="Login"
            routerLink="/auth/login"
            [rounded]="true"
            [text]="true"
        ></button>
        <button pButton pRipple label="Register" routerLink="/auth/register" [rounded]="true"></button>
    </div>
</div>
