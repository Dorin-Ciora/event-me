<div class="h-full w-full mb-4 p-8 flex items-center justify-center">
    <p-stepper [(value)]="activeStep" class="basis-[40rem]">
        <p-step-list>
            <p-step [value]="1" class="flex flex-row flex-auto gap-2">
                <ng-template #content let-activateCallback="activateCallback" let-value="value">
                    <button class="bg-transparent border-0 inline-flex flex-col gap-2">
                        <span
                            class="rounded-full border-2 w-12 h-12 inline-flex items-center justify-center"
                            [ngClass]="{
                                'bg-primary text-primary-contrast border-primary': value <= activeStep,
                                'border-surface': value > activeStep
                            }"
                        >
                            <i class="pi pi-user"></i>
                        </span>
                    </button>
                </ng-template>
            </p-step>
            <p-step [value]="2" class="flex flex-row flex-auto gap-2">
                <ng-template #content let-activateCallback="activateCallback" let-value="value">
                    <button class="bg-transparent border-0 inline-flex flex-col gap-2">
                        <span
                            class="rounded-full border-2 w-12 h-12 inline-flex items-center justify-center"
                            [ngClass]="{
                                'bg-primary text-primary-contrast border-primary': value <= activeStep,
                                'border-surface': value > activeStep
                            }"
                        >
                            <i class="pi pi-star"></i>
                        </span>
                    </button>
                </ng-template>
            </p-step>
            <p-step [value]="3" class="flex flex-row flex-auto gap-2">
                <ng-template #content let-activateCallback="activateCallback" let-value="value">
                    <button class="bg-transparent border-0 inline-flex flex-col gap-2">
                        <span
                            class="rounded-full border-2 w-12 h-12 inline-flex items-center justify-center"
                            [ngClass]="{
                                'bg-primary text-primary-contrast border-primary': value <= activeStep,
                                'border-surface': value > activeStep
                            }"
                        >
                            <i class="pi pi-id-card"></i>
                        </span>
                    </button>
                </ng-template>
            </p-step>
        </p-step-list>
        <p-step-panels>
            <p-step-panel [value]="1">
                <ng-template #content let-activateCallback="activateCallback">
                    <div class="flex justify-center">
                        <p-card [style]="{ width: '25rem', overflow: 'hidden', minHeight: '600px' }">
                            <ng-template #header>
                                <img alt="Card" class="w-full" src="/assets/img/create_event_card_logo.png" />
                            </ng-template>
                            <ng-template #title
                                ><p class="text-center text-blue-500">Creează un eveniment nou</p>
                            </ng-template>
                        </p-card>
                    </div>
                    <div class="flex pt-6 justify-end">
                        <p-button
                            (onClick)="activateCallback(2)"
                            label="Next"
                            icon="pi pi-arrow-right"
                            iconPos="right"
                            severity="info"
                        />
                    </div>
                </ng-template>
            </p-step-panel>
            <p-step-panel [value]="2">
                <ng-template #content let-activateCallback="activateCallback">
                    <div class="flex justify-center">
                        <p-card [style]="{ width: '25rem', overflow: 'hidden', minHeight: '600px' }">
                            <ng-template #header>
                                <img alt="Card" class="w-full" src="/assets/img/create_event_card_logo.png" />
                            </ng-template>
                            <ng-template #title
                                ><p class="text-center text-blue-500">Numele evenimentului</p>
                            </ng-template>
                            <div class="flex justify-center">
                                <input pInputText autocomplete="off" fluid />
                            </div>
                        </p-card>
                    </div>
                    <div class="flex pt-6 justify-between">
                        <p-button
                            (onClick)="activateCallback(1)"
                            label="Back"
                            severity="secondary"
                            icon="pi pi-arrow-left"
                        />
                        <p-button
                            (onClick)="activateCallback(3)"
                            label="Next"
                            icon="pi pi-arrow-right"
                            iconPos="right"
                            severity="info"
                        />
                    </div>
                </ng-template>
            </p-step-panel>
            <p-step-panel [value]="3">
                <ng-template #content let-activateCallback="activateCallback">
                    <div class="flex justify-center">
                        <p-card [style]="{ width: '25rem', overflow: 'hidden', minHeight: '600px' }">
                            <ng-template #header>
                                <img alt="Card" class="w-full" src="/assets/img/create_event_card_logo.png" />
                            </ng-template>
                            <ng-template #title
                                ><p class="text-center text-blue-500">Tipul de eveniment</p></ng-template
                            >
                            <div class="card flex justify-center">
                                <p-select
                                    [options]="cities"
                                    [(ngModel)]="selected"
                                    optionLabel="name"
                                    placeholder="Tipul"
                                    class="w-full md:w-56"
                                />
                            </div>
                        </p-card>
                    </div>
                    <div class="flex pt-6 justify-start">
                        <p-button
                            (onClick)="activateCallback(2)"
                            label="Back"
                            severity="secondary"
                            icon="pi pi-arrow-left"
                        />
                    </div>
                </ng-template>
            </p-step-panel>
        </p-step-panels>
    </p-stepper>
</div>
